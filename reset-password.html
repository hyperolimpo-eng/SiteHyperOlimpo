<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir Senha — HyperOlimpo</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0A1628; --navy-mid: #0D1E38; --accent: #3ABEFF;
      --white: #FFFFFF; --off-white: #CBD8E8; --muted: #7A9BB5;
      --border: rgba(58,190,255,0.18);
    }
    body {
      background: var(--navy); color: var(--off-white);
      font-family: 'Inter', sans-serif; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: var(--navy-mid); border: 1px solid var(--border);
      border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }
    .logo { display: flex; align-items: center; gap: 0.65rem; margin-bottom: 1.8rem; text-decoration: none; }
    .logo img { width: 36px; height: 36px; border-radius: 50%; }
    .logo span { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1rem; color: var(--white); }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; color: var(--white); margin-bottom: 0.4rem; }
    .subtitle { font-size: 0.88rem; color: var(--muted); margin-bottom: 1.8rem; line-height: 1.5; }
    .alert {
      padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none;
    }
    .alert.error   { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; display: block; }
    .alert.success { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: #86efac; display: block; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.76rem; font-weight: 600; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 0.45rem; }
    .pw-wrap { position: relative; }
    .field input {
      width: 100%; background: rgba(10,22,40,0.7); border: 1.5px solid var(--border);
      border-radius: 9px; padding: 0.85rem 2.8rem 0.85rem 1rem; color: var(--white);
      font-family: 'Inter', sans-serif; font-size: 0.92rem; outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .field input::placeholder { color: var(--muted); }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(58,190,255,0.1); }
    .pw-toggle {
      position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: var(--accent); }
    .pw-strength { margin-top: 0.4rem; }
    .pw-bar { height: 3px; background: rgba(58,190,255,0.08); border-radius: 2px; overflow: hidden; }
    .pw-fill { height: 100%; border-radius: 2px; width: 0; transition: width 0.35s, background 0.35s; }
    .pw-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.25rem; }
    .btn {
      width: 100%; background: var(--accent); color: var(--navy);
      border: none; padding: 0.9rem; border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; margin-top: 0.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(58,190,255,0.4); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .back { display: block; text-align: center; margin-top: 1.2rem; font-size: 0.84rem; color: var(--accent); text-decoration: none; }
    .back:hover { text-decoration: underline; }
    .success-state { text-align: center; padding: 1rem 0; display: none; }
    .success-circle {
      width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 1.2rem;
      background: rgba(34,197,94,0.12); border: 1.5px solid rgba(34,197,94,0.35);
      display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
    }
    .success-state h2 { font-family: 'Space Grotesk', sans-serif; color: var(--white); margin-bottom: 0.5rem; }
    .success-state p  { font-size: 0.88rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.4rem; }
  </style>
</head>
<body>
  <div class="card">
    <a href="index.html" class="logo">
      <img src="logo_HO2.png" alt="HyperOlimpo" />
      <span>HyperOlimpo</span>
    </a>

    <div id="formState">
      <h1>Redefinir Senha</h1>
      <p class="subtitle">Escolha uma nova senha para sua conta.</p>
      <div id="alertMsg" class="alert"></div>
      <form id="resetForm" novalidate>
        <div class="field">
          <label>Nova Senha</label>
          <div class="pw-wrap">
            <input type="password" id="novaSenha" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />
            <button type="button" class="pw-toggle" onclick="togglePw('novaSenha',this)">👁</button>
          </div>
          <div class="pw-strength">
            <div class="pw-bar"><div class="pw-fill" id="pwFill"></div></div>
            <div class="pw-label" id="pwLabel"></div>
          </div>
        </div>
        <div class="field">
          <label>Confirmar Nova Senha</label>
          <div class="pw-wrap">
            <input type="password" id="confirmarSenha" placeholder="Repita a nova senha" autocomplete="new-password" />
            <button type="button" class="pw-toggle" onclick="togglePw('confirmarSenha',this)">👁</button>
          </div>
        </div>
        <button type="submit" class="btn" id="btnReset">
          <span id="btnText">Salvar Nova Senha</span>
        </button>
      </form>
      <a href="index.html" class="back">← Voltar ao site</a>
    </div>

    <div class="success-state" id="successState">
      <div class="success-circle">✓</div>
      <h2>Senha redefinida!</h2>
      <p>Sua senha foi atualizada com sucesso. Você já pode fazer login com a nova senha.</p>
      <a href="index.html" class="btn" style="display:inline-flex;align-items:center;justify-content:center;text-decoration:none;width:auto;padding:0.8rem 2rem;">
        Ir para o Login
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    // Supabase processa automaticamente o token de recuperação da URL (#access_token=...)
    db.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        document.getElementById('formState').style.display = 'block';
      }
    });

    function togglePw(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? '👁' : '🙈';
    }

    document.getElementById('novaSenha').addEventListener('input', function () {
      const v = this.value;
      let score = 0;
      if (v.length >= 8)          score++;
      if (/[A-Z]/.test(v))        score++;
      if (/[a-z]/.test(v))        score++;
      if (/\d/.test(v))           score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      const fill  = document.getElementById('pwFill');
      const label = document.getElementById('pwLabel');
      const pcts  = ['0%','20%','40%','65%','85%','100%'];
      const colors= ['','#ef4444','#f97316','#eab308','#22c55e','#3ABEFF'];
      const texts = ['','Muito fraca','Fraca','Razoável','Forte','Muito forte'];
      fill.style.width = pcts[score]; fill.style.background = colors[score];
      label.textContent = v.length ? texts[score] : '';
      label.style.color = colors[score];
    });

    document.getElementById('resetForm').addEventListener('submit', async e => {
      e.preventDefault();
      const senha     = document.getElementById('novaSenha').value;
      const confirmar = document.getElementById('confirmarSenha').value;
      const alert     = document.getElementById('alertMsg');
      const btn       = document.getElementById('btnReset');
      const txt       = document.getElementById('btnText');

      alert.className = 'alert';
      if (senha.length < 8) {
        alert.textContent = 'A senha deve ter pelo menos 8 caracteres.';
        alert.className = 'alert error'; return;
      }
      if (senha !== confirmar) {
        alert.textContent = 'As senhas não coincidem.';
        alert.className = 'alert error'; return;
      }

      btn.disabled = true; txt.textContent = 'Salvando...';
      const { error } = await db.auth.updateUser({ password: senha });
      if (error) {
        btn.disabled = false; txt.textContent = 'Salvar Nova Senha';
        alert.textContent = 'Erro: ' + error.message;
        alert.className = 'alert error';
      } else {
        document.getElementById('formState').style.display = 'none';
        document.getElementById('successState').style.display = 'block';
      }
    });
  </script>
</body>
</html>
